<h2>SEQUENCE DIAGRAM — LLM Query Flow</h2>
<svg width="1000" height="460" viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="sarrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="sarrow-return" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Lifeline labels -->
  <rect x="30"  y="20" width="120" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90"  y="43" text-anchor="middle" fill="white" font-size="11" font-weight="bold">User (Browser)</text>

  <rect x="210" y="20" width="120" height="36" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="270" y="43" text-anchor="middle" fill="white" font-size="11" font-weight="bold">LLMPanel</text>

  <rect x="390" y="20" width="120" height="36" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="450" y="43" text-anchor="middle" fill="white" font-size="11" font-weight="bold">useStore</text>

  <rect x="570" y="20" width="130" height="36" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="635" y="43" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Flask /llm/query</text>

  <rect x="760" y="20" width="130" height="36" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="825" y="43" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Anthropic API</text>

  <!-- Lifelines -->
  <line x1="90"  y1="56" x2="90"  y2="450" stroke="#3b82f6" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="270" y1="56" x2="270" y2="450" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="450" y1="56" x2="450" y2="450" stroke="#06b6d4" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="635" y1="56" x2="635" y2="450" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="825" y1="56" x2="825" y2="450" stroke="#ec4899" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Sequence steps -->

  <!-- 1: User types query -->
  <line x1="90" y1="90" x2="263" y2="90" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#sarrow)"/>
  <text x="176" y="85" text-anchor="middle" fill="#60a5fa" font-size="10">1. type query + submit</text>

  <!-- 2: LLMPanel calls store -->
  <line x1="270" y1="115" x2="443" y2="115" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#sarrow)"/>
  <text x="356" y="110" text-anchor="middle" fill="#60a5fa" font-size="10">2. runLLMQuery(text)</text>

  <!-- 3: Store → Flask -->
  <line x1="450" y1="140" x2="628" y2="140" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#sarrow)"/>
  <text x="539" y="135" text-anchor="middle" fill="#60a5fa" font-size="10">3. POST /api/llm/query</text>

  <!-- 4: Flask → Anthropic -->
  <line x1="635" y1="165" x2="818" y2="165" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#sarrow)"/>
  <text x="726" y="160" text-anchor="middle" fill="#60a5fa" font-size="10">4. messages.create(query)</text>

  <!-- Anthropic processing box -->
  <rect x="778" y="178" width="95" height="50" rx="4" fill="#2d1b4e" stroke="#ec4899" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="825" y="198" text-anchor="middle" fill="#ec4899" font-size="9">LLM interprets</text>
  <text x="825" y="212" text-anchor="middle" fill="#ec4899" font-size="9">query → JSON</text>
  <text x="825" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">filter schema</text>

  <!-- 5: Anthropic returns JSON -->
  <line x1="818" y1="238" x2="642" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#sarrow-return)" stroke-dasharray="5,3"/>
  <text x="730" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">5. filter JSON response</text>

  <!-- 6: Flask returns to store -->
  <line x1="628" y1="265" x2="457" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#sarrow-return)" stroke-dasharray="5,3"/>
  <text x="542" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">6. {filter, description}</text>

  <!-- 7: Store updates state -->
  <rect x="403" y="278" width="95" height="45" rx="4" fill="#0c2340" stroke="#06b6d4" stroke-width="1"/>
  <text x="450" y="298" text-anchor="middle" fill="#06b6d4" font-size="9">set activeFilter</text>
  <text x="450" y="312" text-anchor="middle" fill="#06b6d4" font-size="9">filterDescription</text>

  <!-- 8: Scene re-renders -->
  <line x1="450" y1="330" x2="263" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#sarrow-return)" stroke-dasharray="5,3"/>
  <text x="356" y="325" text-anchor="middle" fill="#94a3b8" font-size="10">7. state update → re-render</text>

  <!-- 9: Highlight buildings -->
  <line x1="270" y1="355" x2="97" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#sarrow-return)" stroke-dasharray="5,3"/>
  <text x="183" y="350" text-anchor="middle" fill="#94a3b8" font-size="10">8. matched buildings highlighted</text>

  <!-- Filter description -->
  <rect x="20" y="375" width="940" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="490" y="391" text-anchor="middle" fill="#64748b" font-size="9">Filter applied CLIENT-SIDE via applyFilter(buildings, activeFilter) — building data never sent to LLM (fast + private)</text>
  <text x="490" y="400" text-anchor="middle" fill="#64748b" font-size="8">applyFilter checks: height_min/max, value_min/max, use_types[], zonings[], year_min/max, levels_min/max, name_contains</text>

  <!-- Step numbers on left -->
  <text x="10" y="94"  fill="#475569" font-size="8">1</text>
  <text x="10" y="119" fill="#475569" font-size="8">2</text>
  <text x="10" y="144" fill="#475569" font-size="8">3</text>
  <text x="10" y="169" fill="#475569" font-size="8">4</text>
  <text x="10" y="242" fill="#475569" font-size="8">5</text>
